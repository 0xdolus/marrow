<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>marrow</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  html, body {
    height: 100%;
    background: #0f0f0f;
    color: #f0ead6;
    font-family: -apple-system, sans-serif;
    overflow: hidden;
  }

  .page {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    padding: 32px 24px;
    gap: 20px;
  }

  .wordmark {
    font-size: 13px;
    letter-spacing: 0.3em;
    color: #444;
    text-transform: lowercase;
    user-select: none;
  }

  .search-wrap {
    width: 100%;
    max-width: 420px;
    position: relative;
  }

  .search-input {
    width: 100%;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    color: #c8bfaf;
    font-size: 15px;
    padding: 14px 48px 14px 18px;
    outline: none;
    caret-color: #5a9a5a;
    -webkit-appearance: none;
    transition: border-color 0.15s;
  }

  .search-input::placeholder {
    color: #444;
  }

  .search-input:focus {
    border-color: #5a9a5a;
  }

  .search-btn {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .search-btn svg {
    stroke: #555;
    transition: stroke 0.15s;
  }

  .search-input:focus ~ .search-btn svg {
    stroke: #5a9a5a;
  }

  .pip {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #5a9a5a;
    margin-top: 8px;
  }
</style>
</head>
<body>
<div class="page">
  <span class="wordmark">marrow</span>

  <div class="search-wrap">
    <input
      class="search-input"
      id="q"
      type="text"
      placeholder="search or enter url"
      autocomplete="off"
      autocorrect="off"
      autocapitalize="off"
      spellcheck="false"
      enterkeyhint="go"
    />
    <button class="search-btn" onclick="doSearch()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
    </button>
  </div>

  <div class="pip" id="pip"></div>
</div>

<script>
  const input = document.getElementById('q');

  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doSearch();
  });

  function doSearch() {
    const val = input.value.trim();
    if (!val) return;
    if (val.startsWith('http://') || val.startsWith('https://')) {
      window.location.href = val;
    } else if (val.includes('.') && !val.includes(' ')) {
      window.location.href = 'https://' + val;
    } else {
      // Search via Yandex
      window.location.href = 'https://yandex.com/search/?text=' +
        encodeURIComponent(val);
    }
  }
</script>
</body>
</html>

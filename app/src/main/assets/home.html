<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Marrow</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: #fff;
            font-family: 'Inter', system-ui, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .logo {
            font-size: 32px;
            font-weight: 500;
            letter-spacing: 2px;
            margin-bottom: 60px;
            opacity: 0.95;
        }
        
        .search-container {
            width: 88%;
            max-width: 520px;
            position: relative;
        }
        
        .search-bar {
            width: 100%;
            background: #111;
            border: 1.5px solid #0a0;
            border-radius: 9999px;
            padding: 16px 24px;
            font-size: 17px;
            color: white;
            outline: none;
        }
        
        .search-bar::placeholder {
            color: #666;
        }
        
        .bottom-bar {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(0, 0, 0, 0.8);
            padding: 8px;
            border-radius: 9999px;
            border: 1px solid #222;
        }
        
        .btn {
            background: #111;
            color: #0f0;
            padding: 10px 18px;
            border-radius: 9999px;
            border: 1px solid #0a0;
            font-size: 15px;
            min-width: 52px;
            text-align: center;
        }
        
        .home-btn {
            background: #0a0;
            color: #000;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="logo">marrow</div>
    
    <div class="search-container">
        <input type="text" class="search-bar" placeholder="search or enter url" autofocus>
    </div>

    <div class="bottom-bar">
        <div class="btn home-btn">home</div>
        <div class="btn">+</div>
        <div class="btn">1</div>
        <div class="btn">pix</div>
    </div>
</body>
</html>

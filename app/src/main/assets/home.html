<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>marrow</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  html, body {
    height: 100%;
    background: #0f0f0f;
    color: #f0ead6;
    font-family: -apple-system, sans-serif;
    overflow: hidden;
  }

  .page {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    padding: 32px 24px;
    gap: 20px;
  }

  .wordmark {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.45em;
    color: #444;
    text-transform: lowercase;
    user-select: none;
  }

  .search-wrap {
    width: 100%;
    max-width: 420px;
    position: relative;
  }

  .search-input {
    width: 100%;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    color: #c8bfaf;
    font-size: 15px;
    padding: 14px 48px 14px 18px;
    outline: none;
    caret-color: #6d8f72;
    -webkit-appearance: none;
    transition: border-color 0.15s, box-shadow 0.15s;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.02),
      0 8px 24px rgba(0,0,0,0.25);
  }

  .search-input::placeholder {
    color: #666;
  }

  .search-input:focus {
    border-color: #6d8f72;
    box-shadow:
      0 0 0 1px rgba(109,143,114,0.4),
      0 8px 24px rgba(0,0,0,0.25);
  }

  .search-btn {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .search-btn svg {
    stroke: #555;
    transition: stroke 0.15s;
  }

  .search-input:focus ~ .search-btn svg {
    stroke: #6d8f72;
  }

  /* Engine dropdown */
  .engine-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    position: relative;
  }

  .engine-btn {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    color: #666;
    font-size: 12px;
    letter-spacing: 0.03em;
    padding: 6px 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: border-color 0.15s, color 0.15s;
    -webkit-appearance: none;
    white-space: nowrap;
  }

  .engine-btn:hover, .engine-btn:focus {
    border-color: #3a3a3a;
    color: #888;
    outline: none;
  }

  .engine-btn .chevron {
    font-size: 9px;
    opacity: 0.5;
  }

  .engine-dropdown {
    display: none;
    position: absolute;
    top: calc(100% + 6px);
    left: 0;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 10px;
    overflow: hidden;
    z-index: 100;
    min-width: 160px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }

  .engine-dropdown.open {
    display: block;
  }

  .engine-option {
    padding: 10px 14px;
    font-size: 13px;
    color: #888;
    cursor: pointer;
    transition: background 0.1s, color 0.1s;
  }

  .engine-option:hover {
    background: #222;
    color: #c8bfaf;
  }

  .engine-option.active {
    color: #6d8f72;
  }

  /* Status pip */
  .pip {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #6d8f72;
    margin-top: 4px;
    transition: background 0.3s;
  }
</style>
</head>
<body>
<div class="page">
  <span class="wordmark">marrow</span>

  <div class="search-wrap">
    <input
      class="search-input"
      id="q"
      type="text"
      placeholder="search or enter url"
      autocomplete="off"
      autocorrect="off"
      autocapitalize="off"
      spellcheck="false"
      enterkeyhint="go"
    />
    <button class="search-btn" onclick="doSearch()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
    </button>
  </div>

  <div class="engine-wrap">
    <button class="engine-btn" id="engineBtn" onclick="toggleDropdown()">
      <span id="engineLabel">Google</span>
      <span class="chevron">▾</span>
    </button>
    <div class="engine-dropdown" id="engineDropdown"></div>
  </div>

  <div class="pip" id="pip"></div>
</div>

<script>
  const input    = document.getElementById('q');
  const pip      = document.getElementById('pip');
  const dropdown = document.getElementById('engineDropdown');
  const label    = document.getElementById('engineLabel');

  const ENGINES = {
    'Google':         'https://www.google.com/search?q=',
    'Bing':           'https://www.bing.com/search?q=',
    'Yahoo':          'https://search.yahoo.com/search?p=',
    'Yandex':         'https://yandex.com/search/?text=',
    'DuckDuckGo':     'https://duckduckgo.com/?q=',
    'Brave':          'https://search.brave.com/search?q=',
    'YouTube':        'https://www.youtube.com/results?search_query=',
    'Gibiru':         'https://gibiru.com/results.html?q=',
    'Perplexity':     'https://www.perplexity.ai/search?q=',
    'You.com':        'https://you.com/search?q=',
    'Startpage':      'https://www.startpage.com/search?q=',
    'Baidu':          'https://www.baidu.com/s?wd=',
    'Kagi':           'https://kagi.com/search?q=',
    'Ecosia':         'https://www.ecosia.org/search?q=',
    'Qwant':          'https://www.qwant.com/?q=',
    'Naver':          'https://search.naver.com/search.naver?query=',
    'Swisscows':      'https://swisscows.com/web?query=',
    'Reddit':         'https://www.reddit.com/search/?q=',
    'Andi':           'https://andisearch.com/?q=',
    'Phind':          'https://www.phind.com/search?q=',
    'Mojeek':         'https://www.mojeek.com/search?q=',
    'MetaGer':        'https://metager.org/meta/meta.ger3?eingabe=',
    'Wikipedia':      'https://en.wikipedia.org/w/index.php?search=',
    'Gigablast':      'https://www.gigablast.com/search?q=',
    'Presearch':      'https://presearch.com/search?q=',
    'Searx':          'https://searx.be/search?q=',
    'Dogpile':        'https://www.dogpile.com/serp?q=',
    'Google Scholar': 'https://scholar.google.com/scholar?q=',
    'Wolfram Alpha':  'https://www.wolframalpha.com/input?i=',
    'AOL Search':     'https://search.aol.com/aol/search?q='
  };

  let selectedEngine = localStorage.getItem('engine') || 'Google';

  function buildDropdown() {
    dropdown.innerHTML = '';
    Object.keys(ENGINES).forEach(name => {
      const opt = document.createElement('div');
      opt.className = 'engine-option' + (name === selectedEngine ? ' active' : '');
      opt.textContent = name;
      opt.onclick = () => selectEngine(name);
      dropdown.appendChild(opt);
    });
  }

  function selectEngine(name) {
    selectedEngine = name;
    localStorage.setItem('engine', name);
    label.textContent = name;
    dropdown.classList.remove('open');
    buildDropdown();
  }

  function toggleDropdown() {
    dropdown.classList.toggle('open');
  }

  document.addEventListener('click', e => {
    if (!e.target.closest('.engine-wrap')) {
      dropdown.classList.remove('open');
    }
  });

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') doSearch();
  });

  document.addEventListener('keydown', e => {
    if (e.key === '/' && document.activeElement !== input) {
      e.preventDefault();
      input.focus();
    }
  });

  function doSearch() {
    const val = input.value.trim();
    if (!val) return;
    pip.style.background = '#c8a34a';
    if (val.startsWith('http://') || val.startsWith('https://')) {
      window.location.href = val;
    } else if (/^[a-zA-Z0-9-]+\.[a-zA-Z]{2,}/.test(val) && !val.includes(' ')) {
      window.location.href = 'https://' + val;
    } else {
      window.location.href = ENGINES[selectedEngine] + encodeURIComponent(val);
    }
  }

  // Init
  buildDropdown();
  label.textContent = selectedEngine;

  window.addEventListener('load', () => {
    input.focus();
    pip.style.background = '#6d8f72';
  });
</script>
</body>
</html>
